<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Protocolo de Emergencia - Propiedades de la Materia</title>
<style>
:root{
  --bg:#050a18;
  --panel:#0f172a;
  --accent:#00d2ff;
  --accent2:#64ffda;
  --danger:#ff2a2a;
  --text:#dbeafe;
  --gold: #ffcc00;
}

html,body{height:100%; margin:0; background:var(--bg); font-family: monospace; overflow: hidden; color: var(--text); touch-action: none;}
#wrap{position:relative; height:100vh; display:flex; align-items:center; justify-content:center; flex-direction: column;}

canvas{
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  background: #081028;
  border: 4px solid #1e293b;
  box-shadow: 0 0 30px rgba(255, 0, 0, 0.2);
  max-width: 100%;
  max-height: 70vh;
  object-fit: contain;
  transition: box-shadow 0.3s;
}

/* Efecto visual de daño/alerta */
#damage-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(255, 0, 0, 0); pointer-events: none; z-index: 5;
  transition: background 0.2s;
}
.critical-alert { box-shadow: 0 0 50px rgba(255, 0, 0, 0.8) !important; animation: pulse 1s infinite; }
@keyframes pulse { 0% { box-shadow: 0 0 20px red; } 50% { box-shadow: 0 0 60px red; } 100% { box-shadow: 0 0 20px red; } }

#hud{
  position:absolute; left:10px; top:10px;
  background: rgba(15, 23, 42, 0.9); border: 2px solid var(--danger);
  padding:10px; border-radius:4px;
  backdrop-filter: blur(5px); z-index: 10;
}
#timer-box { font-size: 18px; color: var(--danger); font-weight: bold; margin-bottom: 5px; text-shadow: 0 0 8px red; transition: color 0.3s;}
.time-penalty { color: white !important; text-shadow: 0 0 15px white !important; }

#modal, #login-modal {
  position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
  width:90%; max-width: 480px;
  background:var(--panel); border:4px solid var(--accent2);
  padding:20px; display:none; z-index:40;
  box-shadow: 0 0 0 4px #000, 0 10px 50px rgba(0,0,0,0.9);
}

.def-box {
    background: rgba(100, 255, 218, 0.1);
    border-left: 4px solid var(--accent2);
    padding: 10px; margin: 10px 0; font-size: 14px; color: #fff; line-height: 1.4;
}

.keypad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
.key-display { background: #000; border: 2px solid var(--accent); color: var(--accent2); font-size: 24px; text-align: center; padding: 10px; height: 30px; letter-spacing: 12px; }

.btn {
  padding:12px; border:none; background:var(--accent2); color:#061021; 
  font-weight:bold; cursor:pointer; box-shadow: 4px 4px 0 rgba(0,0,0,0.5);
  font-family: inherit; text-transform: uppercase; width: 100%; margin-bottom: 5px;
}
.btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 rgba(0,0,0,0.5); }
.btn-danger { background: var(--danger); color: white; }
.btn-gold { background: var(--gold); color: #000; }

input[type="text"] {
    width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box;
    background: #000; color: var(--accent2); border: 2px solid var(--accent);
    font-family: monospace; font-size: 16px; text-align: center;
}

/* Controles móviles mejorados */
#mobile-controls {
  display: flex; justify-content: center; gap: 15px; margin-top: 15px; width: 100%; padding: 10px;
}
.m-btn {
  width: 65px; height: 65px; border-radius: 50%; border: 2px solid var(--accent2);
  background: rgba(15, 23, 42, 0.8); color: white; font-size: 28px; font-weight: bold;
  display: flex; align-items: center; justify-content: center; user-select: none;
  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}
.m-btn:active { background: var(--accent2); color: black; transform: scale(0.95); }

@media (min-width: 768px) {
    #mobile-controls { display: none; }
    canvas { max-height: none; }
}
</style>
</head>
<body>
<div id="wrap">
  <div id="damage-overlay"></div>
  
  <div id="login-modal" style="display:block;">
      <h2 style="text-align:center;">IDENTIFICACIÓN</h2>
      <p style="text-align:center;">Ingrese su código para acceder al simulador.</p>
      <input type="text" id="zip-input" placeholder="Ej: 101022026">
      <button class="btn btn-gold" id="btn-login">VERIFICAR CÓDIGO</button>
      <p id="login-msg" style="color:var(--danger); text-align:center; display:none;"></p>
  </div>

  <canvas id="game"></canvas>

  <div id="hud">
    <div id="timer-box">AUTO-DESTRUCCIÓN: <span id="time">02:00</span></div>
    <div>SALA: <span id="hud-room">1</span>/4 | LOGS: <span id="hud-progress">0</span>/4</div>
    <div style="margin-top:8px; border-top:1px solid #450a0a; padding-top:4px;">
      CÓDIGO: <span id="hud-code" style="color:var(--accent2); font-weight:bold;">----</span>
    </div>
    <div id="hud-isotope" style="color:#64ffda; margin-top:4px; display:none;">☢️ ISÓTOPO RECUPERADO</div>
  </div>

  <div id="modal">
    <h2 id="modal-title">SISTEMA</h2>
    <div id="modal-content">
        <p id="modal-question"></p>
        <div id="keypad-container" style="display:none;">
            <div class="key-display" id="key-screen"></div>
            <div class="keypad-grid" id="keypad-btns"></div>
        </div>
        <div class="opts" id="modal-opts" style="display:flex; flex-direction:column; gap:5px;"></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:15px;justify-content:center;">
      <button class="btn btn-danger" id="modal-close" style="width:auto;">CERRAR</button>
    </div>
  </div>

  <div id="mobile-controls">
      <div class="m-btn" id="btn-left">⬅️</div>
      <div class="m-btn" id="btn-right">➡️</div>
      <div class="m-btn" id="btn-jump">⬆️</div>
      <div class="m-btn" id="btn-interact" style="border-color: var(--gold); margin-left:20px;">✋</div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-analytics.js";
  import { getFirestore, collection, doc, getDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

  const firebaseConfig = {
      apiKey: "AIzaSyCw4JnCCFHVogAEXncodxi9jnwigO7qUIA",
      authDomain: "quimicaquest.firebaseapp.com",
      projectId: "quimicaquest",
      storageBucket: "quimicaquest.firebasestorage.app",
      messagingSenderId: "796534851347",
      appId: "1:796534851347:web:ae85716a8b612d889b3ce6",
      measurementId: "G-XJP89X1R9K"
  };

  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const db = getFirestore(app);

  let currentStudent = null;

  document.getElementById('btn-login').addEventListener('click', async () => {
      const codeStr = document.getElementById('zip-input').value.trim();
      const msg = document.getElementById('login-msg');
      if (!codeStr) return;
      
      msg.style.display = 'block';
      msg.style.color = 'var(--accent2)';
      msg.innerText = "Buscando en la base de datos...";

      try {
          const docRef = doc(db, "estudiantes", codeStr);
          const docSnap = await getDoc(docRef);

          if (docSnap.exists()) {
              currentStudent = docSnap.data(); 
              currentStudent.zipgrade = codeStr; 
              document.getElementById('login-modal').style.display = 'none';
              showIntro(); 
          } else {
              msg.style.color = 'var(--danger)';
              msg.innerText = "Código no encontrado. Verifica los números.";
          }
      } catch (error) {
          console.error("Error conectando a Firebase:", error);
          msg.style.color = 'var(--danger)';
          msg.innerText = "Error de conexión. Verifica la consola.";
      }
  });

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const V_W = 640; const V_H = 360; const SCALE = 2; 
  const GROUND_Y = V_H - 60;
  canvas.width = V_W; canvas.height = V_H;

  // CORRECCIÓN: Definiciones científicas precisas
  const QUESTION_POOLS = [
    [ // Sala 1
      { q: "¿Qué propiedad explica la resistencia de un cuerpo a cambiar su estado de reposo o movimiento?", opts: ["Inercia", "Impenetrabilidad", "Densidad", "Volumen"], c: 0, def: "🪐 La INERCIA es una propiedad general; a mayor masa, mayor inercia." },
      { q: "¿Por qué dos cuerpos no pueden ocupar el mismo espacio simultáneamente?", opts: ["Porcelana", "Impenetrabilidad", "Tenacidad", "Elasticidad"], c: 1, def: "🧱 La IMPENETRABILIDAD es una propiedad extrínseca de toda la materia." },
      { q: "A diferencia de la masa, ¿qué propiedad varía dependiendo de la gravedad del planeta?", opts: ["Volumen", "Inercia", "Peso", "Punto de fusión"], c: 2, def: "⚖️ El PESO es una fuerza que depende de la gravedad, mientras que la masa es constante." },
      { q: "¿Qué propiedad general describe los espacios intermoleculares vacíos en la materia?", opts: ["Porosidad", "Densidad", "Compresibilidad", "Volumen"], c: 0, def: "🧽 La POROSIDAD indica que toda materia tiene espacios vacíos entre sus partículas." },
      { q: "Propiedad que indica que la materia puede ser fraccionada en partes cada vez más pequeñas:", opts: ["Impenetrabilidad", "Divisibilidad", "Inercia", "Peso"], c: 1, def: "🔪 La DIVISIBILIDAD permite que la materia se divida sin perder sus propiedades fundamentales." }
    ],
    [ // Sala 2
      { q: "Si cortas un bloque de hierro a la mitad, ¿qué propiedad se mantiene exactamente igual?", opts: ["Volumen", "Masa", "Peso", "Densidad"], c: 3, def: "🧊 La DENSIDAD es intensiva/intrínseca; la relación masa/volumen no cambia al dividir la muestra." },
      { q: "La temperatura a la cual la presión de vapor del sólido iguala a la del líquido y coexisten las tres fases es:", opts: ["Punto de ebullición", "Punto triple", "Punto de fusión", "Calor específico"], c: 1, def: "🔺 En el PUNTO TRIPLE coexisten en equilibrio los estados sólido, líquido y gaseoso." },
      { q: "La capacidad de una sustancia de disolverse en otra a una temperatura determinada es:", opts: ["Miscibilidad", "Densidad", "Solubilidad", "Viscosidad"], c: 2, def: "💧 La SOLUBILIDAD es una propiedad física intrínseca que depende del soluto, solvente y temperatura." },
      { q: "¿Qué propiedad permite a los metales oponer baja resistencia al paso de electrones?", opts: ["Ductilidad", "Conductividad eléctrica", "Electronegatividad", "Calor específico"], c: 1, def: "⚡ La CONDUCTIVIDAD ELÉCTRICA es la capacidad de permitir el flujo de corriente." },
      { q: "La temperatura en la que la presión de vapor de un líquido iguala a la presión exterior es su:", opts: ["Punto de fusión", "Punto de ebullición", "Sublimación", "Densidad"], c: 1, def: "🔥 En el PUNTO DE EBULLICIÓN el líquido pasa al estado gaseoso en toda su masa." }
    ],
    [ // Sala 3
      { q: "La pérdida de electrones de un átomo o molécula durante una reacción química se denomina:", opts: ["Reducción", "Combustión", "Oxidación", "Electrólisis"], c: 2, def: "🍎 La OXIDACIÓN es una propiedad química donde hay pérdida de electrones." },
      { q: "La tendencia de un elemento a combinarse con otros para alcanzar estabilidad electrónica es su...", opts: ["Reactividad", "Electronegatividad", "Afinidad electrónica", "Energía de ionización"], c: 0, def: "🔄 La REACTIVIDAD química define cómo y con qué otras sustancias reaccionará un material." },
      { q: "¿Qué reacción química requiere de un combustible, un comburente (oxígeno) y una energía de activación?", opts: ["Combustión", "Corrosión", "Putrefacción", "Fermentación"], c: 0, def: "🔥 La COMBUSTIÓN es una reacción de oxidación rápida que libera luz y calor." },
      { q: "La capacidad de una sustancia de liberar iones H+ en una solución acuosa define su:", opts: ["Alcalinidad", "Acidez", "Basicidad", "Neutralidad"], c: 1, def: "🍋 La ACIDEZ es una propiedad química clave en las reacciones ácido-base." },
      { q: "La capacidad de una sustancia de causar daño a organismos vivos alterando sus procesos químicos es:", opts: ["Acidez", "Corrosividad", "Toxicidad", "Oxidación"], c: 2, def: "☠️ La TOXICIDAD describe los efectos nocivos de una sustancia sobre los seres vivos." }
    ],
    [ // Sala 4
      { q: "La energía total que absorbe un material antes de romperse o fracturarse se conoce como:", opts: ["Dureza", "Tenacidad", "Fragilidad", "Elasticidad"], c: 1, def: "🛡️ La TENACIDAD es la resistencia a la rotura por tracción o impacto." },
      { q: "En la escala de Mohs, ¿qué propiedad evalúa la resistencia de un material a ser rayado?", opts: ["Dureza", "Tenacidad", "Cohesión", "Adherencia"], c: 0, def: "💎 La DUREZA (como la del diamante) mide la resistencia superficial al rayado." },
      { q: "La capacidad de un material de recuperar su forma original tras cesar la fuerza deformante es:", opts: ["Plasticidad", "Maleabilidad", "Elasticidad", "Viscosidad"], c: 2, def: "🏹 La ELASTICIDAD es típica de resortes y gomas, oponiéndose a la deformación permanente." },
      { q: "La resistencia interna que opone un fluido a fluir libremente se denomina:", opts: ["Tensión superficial", "Densidad", "Capilaridad", "Viscosidad"], c: 3, def: "🍯 La VISCOSIDAD (ej. la miel) depende de las fuerzas de cohesión entre las moléculas del fluido." },
      { q: "La capacidad de algunos metales de dejarse reducir a láminas muy delgadas se llama:", opts: ["Ductilidad", "Elasticidad", "Tenacidad", "Maleabilidad"], c: 3, def: "🛡️ La MALEABILIDAD permite formar láminas sin que el material se rompa." }
    ]
  ];

  const player = { x: 60, y: GROUND_Y - 48, w: 24, h: 48, vx: 0, vy: 0, speed: 3.5, jumpForce: -11, gravity: 0.6, dir: 1, frame: 0, isMoving: false, isGrounded: true };
  const camera = { x: 0 };
  const terminals = []; const doors = []; const obstacles = [];
  
  const REAL_CODE = [];
  let partialCode = ['-','-','-','-'];
  let solvedCount = 0;
  let modalOpen = true; 
  let gameTime = 120;
  let currentKeyInput = "";
  let isPlaying = false; 
  
  let isotope = { x: 0, y: 0, w: 20, h: 20, collected: false };

  let tLeft = false, tRight = false, tJump = false;

  const AudioContext = window.AudioContext || window.webkitAudioContext;
  const audioCtx = new AudioContext();

  function vibrate(ms) {
      if (navigator.vibrate) navigator.vibrate(ms);
  }

  function playValidSound() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
      osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); 
      gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
      gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.05);
      gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + 0.3);
  }

  function triggerDamage() {
      vibrate([100, 50, 100]); 
      const overlay = document.getElementById('damage-overlay');
      overlay.style.background = 'rgba(255, 0, 0, 0.4)';
      const tBox = document.getElementById('timer-box');
      tBox.classList.add('time-penalty');
      setTimeout(() => { 
          overlay.style.background = 'rgba(255, 0, 0, 0)'; 
          tBox.classList.remove('time-penalty');
      }, 300);
  }

  function initWorld() {
    const ROOM_W = 600; const GAP = 120;
    for (let i = 0; i < 4; i++) {
      REAL_CODE.push(Math.floor(Math.random() * 9 + 1).toString());

      const rx = i * (ROOM_W + GAP);
      const pool = QUESTION_POOLS[i];
      const randomQ = pool[Math.floor(Math.random() * pool.length)];
      terminals.push({ id: i, x: rx + 250, y: GROUND_Y - 80, w: 60, h: 40, solved: false, data: randomQ });
      doors.push({ id: i, x: rx + ROOM_W + 40, y: GROUND_Y - 90, w: 40, h: 90, open: false, isFinal: (i === 3) });
      obstacles.push({ x: rx + 420, y: GROUND_Y - 35, w: 70, h: 35, type: 'table' });
      
      if(i > 0) obstacles.push({ x: rx + 80, y: GROUND_Y - 45, w: 40, h: 45, type: 'box' });
      // Obstáculo alto en la segunda sala
      if(i === 1) obstacles.push({ x: rx + 120, y: GROUND_Y - 110, w: 40, h: 110, type: 'box' });
    }
    
    // CORRECCIÓN: Ubicar isótopo en la última sala, en un lugar alto (sobre la caja)
    const lastRoomX = 3 * (ROOM_W + GAP);
    isotope.x = lastRoomX + 90; // Posicionado sobre la caja (rx + 80)
    isotope.y = GROUND_Y - 140; // Alto en el aire para forzar el salto
  }

  function drawDecor() {
      ctx.strokeStyle = "rgba(100, 255, 218, 0.05)";
      for(let i=0; i<20; i++) {
          const x = (i * 200 - camera.x * 0.2) % 2800; 
          const y = 30 + (i % 4) * 50;
          ctx.beginPath(); ctx.arc(x, y, 6, 0, Math.PI*2); ctx.stroke();
      }
      ctx.strokeStyle = "rgba(100, 255, 218, 0.1)";
      for(let i=0; i<15; i++) {
          const x = (i * 280 - camera.x * 0.5) % 2800; 
          const y = 50 + (i % 3) * 60;
          ctx.beginPath(); ctx.rect(x, y, 15, 15); ctx.stroke();
      }

      let opacity = (Math.sin(Date.now() / 150) + 1) / 8;
      if (gameTime <= 30) {
          opacity = (Math.sin(Date.now() / 100) + 1) / 4; 
          canvas.classList.add('critical-alert');
      } else {
          canvas.classList.remove('critical-alert');
      }
      ctx.fillStyle = `rgba(255, 0, 0, ${opacity})`; ctx.fillRect(0, 0, V_W, V_H);
  }

  function drawPlayer() {
    const px = player.x - camera.x; const py = player.y;
    const swing = player.isMoving ? Math.sin(player.frame * 0.2) * 8 : 0;
    const bounce = player.isMoving ? Math.abs(Math.cos(player.frame * 0.2)) * 3 : 0;
    ctx.fillStyle = "#1e293b"; ctx.fillRect(px + 4, py + 32 - bounce, 7, 16 + (player.isGrounded ? swing : 0)); ctx.fillRect(px + 13, py + 32 - bounce, 7, 16 - (player.isGrounded ? swing : 0));
    ctx.fillStyle = "#f8fafc"; ctx.fillRect(px + (player.dir === 1 ? -4 : 22), py + 14 - bounce, 6, 14 - swing/2);
    ctx.fillRect(px, py + 10 - bounce, 24, 24); ctx.fillStyle = "#cbd5e1"; ctx.fillRect(px + 11, py + 14 - bounce, 2, 18);
    ctx.fillStyle = "#f8fafc"; ctx.fillRect(px + (player.dir === 1 ? 22 : -4), py + 14 - bounce, 6, 14 + swing/2);
    ctx.fillStyle = "#fdba74"; ctx.fillRect(px + (player.dir === 1 ? 22 : -4), py + 26 + swing/2 - bounce, 6, 4);
    ctx.fillRect(px + 8, py + 6 - bounce, 8, 4); ctx.fillRect(px + 4, py - 8 - bounce, 16, 16);
    ctx.fillStyle = "#94a3b8"; ctx.fillRect(px + 2, py - 10 - bounce, 20, 6); ctx.fillRect(px + (player.dir === 1 ? 2 : 18), py - 6 - bounce, 4, 12);
    ctx.fillStyle = "#000"; const eyeX = player.dir === 1 ? px + 14 : px + 6; ctx.fillRect(eyeX, py - 2 - bounce, 4, 4); ctx.fillStyle = "#fff"; ctx.fillRect(eyeX + 1, py - 1 - bounce, 2, 2);
  }

  function drawObstacles() { obstacles.forEach(o => { ctx.fillStyle = o.type === 'table' ? '#475569' : '#78350f'; ctx.fillRect(o.x - camera.x, o.y, o.w, o.h); ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.strokeRect(o.x - camera.x, o.y, o.w, o.h); }); }
  
  function drawTerminal(t) { 
      const tx = t.x - camera.x; 
      const blink = (Math.sin(Date.now() / 200) + 1) / 2; 
      ctx.fillStyle = '#1e293b'; ctx.fillRect(tx, t.y, t.w, t.h); 
      ctx.fillStyle = t.solved ? "#065f46" : "#000"; ctx.fillRect(tx + 4, t.y + 4, t.w - 8, t.h - 12); 
      
      if(!t.solved) { 
          ctx.strokeStyle = `rgba(0, 210, 255, ${blink})`; ctx.lineWidth = 2; ctx.strokeRect(tx - 2, t.y - 2, t.w + 4, t.h + 4); 
          if (Math.abs((player.x + player.w/2) - (t.x + t.w/2)) < 50) {
              ctx.fillStyle = "white"; ctx.font = "12px monospace"; ctx.textAlign = "center";
              ctx.fillText("[E] o ✋", tx + t.w/2, t.y - 15 + Math.sin(Date.now()/150)*3);
          }
      } 
  }

  function drawDoor(d) { 
      const dx = d.x - camera.x; ctx.fillStyle = d.open ? "#020617" : "#334155"; ctx.fillRect(dx, d.y, d.w, d.h); 
      ctx.strokeStyle = d.isFinal ? '#ffcc00' : '#00d2ff'; ctx.strokeRect(dx, d.y, d.w, d.h); 
      
      if (d.isFinal && !d.open && Math.abs((player.x + player.w/2) - (d.x + d.w/2)) < 50) {
          ctx.fillStyle = "white"; ctx.font = "12px monospace"; ctx.textAlign = "center";
          ctx.fillText("SALIDA [E]", dx + d.w/2, d.y - 10 + Math.sin(Date.now()/150)*3);
      }
  }

  function drawIsotope() {
      if(isotope.collected) return;
      const ix = isotope.x - camera.x;
      const hover = Math.sin(Date.now() / 200) * 5;
      ctx.fillStyle = "#64ffda";
      ctx.beginPath(); ctx.arc(ix + 10, isotope.y + 10 + hover, 8, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 15; ctx.shadowColor = "#64ffda"; ctx.fill(); ctx.shadowBlur = 0; 
  }

  function update() {
    if (modalOpen || gameTime <= 0 || !isPlaying) return;

    let nx = player.x; player.isMoving = false;
    
    if (keys['ArrowRight'] || keys['d'] || tRight) { nx += player.speed; player.dir = 1; player.isMoving = true; }
    if (keys['ArrowLeft'] || keys['a'] || tLeft) { nx -= player.speed; player.dir = -1; player.isMoving = true; }
    if ((keys[' '] || keys['w'] || keys['ArrowUp'] || tJump) && player.isGrounded) {
      player.vy = player.jumpForce; player.isGrounded = false;
      vibrate(15); 
    }

    player.vy += player.gravity; player.y += player.vy;
    if (player.y + player.h > GROUND_Y) { player.y = GROUND_Y - player.h; player.vy = 0; player.isGrounded = true; }

    obstacles.forEach(o => {
        if (player.x + player.w > o.x && player.x < o.x + o.w) {
            if (player.vy > 0 && player.y + player.h <= o.y + 10 && player.y + player.h + player.vy >= o.y) {
                player.y = o.y - player.h; player.vy = 0; player.isGrounded = true;
            }
        }
        if (player.y + player.h > o.y + 5 && player.y < o.y + o.h - 5) {
            if (nx + player.w > o.x && nx < o.x + o.w) nx = player.x;
        }
    });

    player.x = nx;
    doors.forEach(d => { if(!d.open && player.x + player.w > d.x && player.x < d.x + d.w) player.x = d.x - player.w; });
    
    // CORRECCIÓN: Lógica de colisión mejorada para asegurar que el jugador esté a la altura correcta
    if (!isotope.collected && 
        player.x + player.w > isotope.x && 
        player.x < isotope.x + isotope.w && 
        player.y < isotope.y + isotope.h && 
        player.y + player.h > isotope.y) {
        
        isotope.collected = true;
        playValidSound();
        document.getElementById('hud-isotope').style.display = 'block';
    }

    camera.x += (player.x - camera.x - V_W/3) * 0.1; camera.x = Math.max(0, Math.min(camera.x, 2400));
    player.frame++;
  }

  setInterval(() => {
      if(!modalOpen && gameTime > 0 && isPlaying) {
          gameTime--;
          const m = Math.floor(gameTime / 60); const s = gameTime % 60;
          document.getElementById('time').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
          if(gameTime <= 0) alert("EVACUACIÓN FALLIDA: EL LABORATORIO SE HA SELLADO.");
      }
  }, 1000);

  function showIntro() {
      modalOpen = true;
      document.getElementById('modal').style.display = 'block';
      document.getElementById('modal-title').innerText = `BIENVENIDO, ${currentStudent?.nombre || 'ESTUDIANTE'}`;
      document.getElementById('modal-question').innerHTML = `
          <div class="def-box">
              <strong>Misión:</strong> Desbloquea las 4 terminales respondiendo preguntas de química.<br><br>
              <strong>NUEVO OBJETIVO:</strong> Localiza y recoge el ISÓTOPO INESTABLE (☢️) antes de salir.<br><br>
              <strong>Controles:</strong> Usa los botones en pantalla (Móvil) o las flechas/WASD + "E" (PC).
          </div>
          <p style="color:red">PELIGRO: Respuestas incorrectas restan 20 segundos al reloj.</p>
      `;
      const opts = document.getElementById('modal-opts'); opts.innerHTML = '';
      const b = document.createElement('button'); b.className = 'btn btn-gold'; b.innerText = "INICIAR MISIÓN";
      b.onclick = () => { isPlaying = true; closeModal(); };
      opts.appendChild(b);
  }

  function openQuestion(id) {
      modalOpen = true; const t = terminals[id];
      document.getElementById('modal').style.display = 'block';
      document.getElementById('modal-title').innerText = `TERMINAL ${id+1}`;
      document.getElementById('modal-question').innerText = t.data.q;
      document.getElementById('keypad-container').style.display = 'none';
      const optsDiv = document.getElementById('modal-opts'); optsDiv.style.display = 'flex'; optsDiv.innerHTML = '';
      
      t.data.opts.forEach((opt, i) => {
          const b = document.createElement('button'); b.className = 'btn'; b.innerText = opt;
          b.onclick = () => {
              if (i === t.data.c) {
                  document.getElementById('modal-question').innerHTML = `<span style="color:var(--accent2)">ACCESO CONCEDIDO - DÍGITO: ${REAL_CODE[id]}</span><div class="def-box">${t.data.def}</div>`;
                  optsDiv.innerHTML = '';
                  const cb = document.createElement('button'); cb.className = 'btn btn-gold'; cb.innerText = "REGISTRAR";
                  
                  cb.onclick = () => {
                      playValidSound(); 
                      t.solved = true; solvedCount++; partialCode[id] = REAL_CODE[id];
                      document.getElementById('hud-progress').innerText = solvedCount;
                      document.getElementById('hud-code').innerText = partialCode.join('');
                      if (id < 3) doors[id].open = true;
                      closeModal();
                  };
                  optsDiv.appendChild(cb);
              } else { 
                  triggerDamage();
                  gameTime = Math.max(0, gameTime - 20);
                  alert("ERROR DE AUTENTICACIÓN: -20 SEGUNDOS PENALIZACIÓN"); 
              }
          };
          optsDiv.appendChild(b);
      });
  }

  function openKeypad() {
      modalOpen = true; currentKeyInput = "";
      document.getElementById('modal').style.display = 'block';
      document.getElementById('modal-title').innerText = "BLOQUEO FINAL";
      document.getElementById('keypad-container').style.display = 'block';
      document.getElementById('modal-opts').style.display = 'none';
      const grid = document.getElementById('keypad-btns'); grid.innerHTML = '';
      for(let i=1; i<=9; i++) createKey(i, grid);
      createKey("C", grid, "btn-danger"); createKey(0, grid); createKey("OK", grid, "btn-gold");
      updateKeyScreen();
  }

  function createKey(val, container, extraClass = "") {
      const b = document.createElement('button'); b.className = `btn ${extraClass}`; b.innerText = val;
      b.onclick = async () => {
          if (val === "C") currentKeyInput = "";
          else if (val === "OK") {
              if (currentKeyInput === REAL_CODE.join('')) {
                  doors[3].open = true; 
                  document.getElementById('modal-title').innerText = "PROCESANDO...";
                  document.getElementById('keypad-container').style.display = 'none';
                  
                  const recordData = {
                      juego: "scape_materia",
                      estudiante_id: currentStudent?.zipgrade || "Anon",
                      nombre: currentStudent?.nombre || "Anónimo",
                      tiempoRestante: gameTime,
                      fecha: new Date().toISOString(),
                      isotopo_recuperado: isotope.collected 
                  };

                  try {
                      await addDoc(collection(db, "Scaperoom"), recordData);
                      alert("¡RÉCORD GUARDADO EN LA NUBE! LABORATORIO EVACUADO.");
                  } catch (e) {
                      console.error("Error guardando:", e);
                      let offlineRecords = JSON.parse(localStorage.getItem('offline_records') || '[]');
                      offlineRecords.push(recordData);
                      localStorage.setItem('offline_records', JSON.stringify(offlineRecords));
                      alert("Laboratorio evacuado. Sin internet: el puntaje se guardó en este dispositivo.");
                  }
                  closeModal();
              } else { 
                  triggerDamage();
                  gameTime = Math.max(0, gameTime - 5);
                  alert("CÓDIGO INVÁLIDO. -5 Segundos."); 
                  currentKeyInput = ""; 
              }
          } else if (currentKeyInput.length < 4) currentKeyInput += val;
          updateKeyScreen();
      };
      container.appendChild(b);
  }

  function updateKeyScreen() { document.getElementById('key-screen').innerText = currentKeyInput.padEnd(4, '_'); }
  function closeModal() { modalOpen = false; document.getElementById('modal').style.display = 'none'; }

  function tryInteract() {
      terminals.forEach(t => {
          if (player.x + player.w > t.x - 30 && player.x < t.x + t.w + 30) {
              if (!t.solved) openQuestion(t.id);
          }
      });
      const lastDoor = doors[3];
      if (player.x + player.w > lastDoor.x - 30 && player.x < lastDoor.x + lastDoor.w + 30) {
          if (solvedCount < 4) {
              alert("ERROR: Faltan registros.");
          } else if (!isotope.collected) {
              alert("PROTOCOLO INCOMPLETO: Debes recuperar el ISÓTOPO INESTABLE antes de salir.");
          } else {
              openKeypad();
          }
      }
  }

  const btnLeft = document.getElementById('btn-left');
  const btnRight = document.getElementById('btn-right');
  const btnJump = document.getElementById('btn-jump');
  const btnInteract = document.getElementById('btn-interact');

  btnLeft.addEventListener('touchstart', (e)=>{e.preventDefault(); tLeft = true;});
  btnLeft.addEventListener('touchend', (e)=>{e.preventDefault(); tLeft = false;});
  btnRight.addEventListener('touchstart', (e)=>{e.preventDefault(); tRight = true;});
  btnRight.addEventListener('touchend', (e)=>{e.preventDefault(); tRight = false;});
  btnJump.addEventListener('touchstart', (e)=>{e.preventDefault(); tJump = true;});
  btnJump.addEventListener('touchend', (e)=>{e.preventDefault(); tJump = false;});
  btnInteract.addEventListener('touchstart', (e)=>{e.preventDefault(); tryInteract();});

  const keys = {};
  window.addEventListener('keydown', (e) => {
      keys[e.key] = true;
      if(e.key.toLowerCase() === 'e' && !modalOpen) tryInteract(); 
  });
  window.addEventListener('keyup', (e) => keys[e.key] = false);
  document.getElementById('modal-close').onclick = closeModal;

  function main() {
      ctx.clearRect(0,0,V_W,V_H); drawDecor();
      ctx.fillStyle = "#1e293b"; ctx.fillRect(0, GROUND_Y, V_W, 60);
      drawObstacles(); drawIsotope(); terminals.forEach(drawTerminal); doors.forEach(drawDoor); drawPlayer();
      update(); requestAnimationFrame(main);
  }

  initWorld();
  main();
</script>
</body>
</html>
