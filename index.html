<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Laboratorio SNES - Escape Química Pro</title>
<style>
:root{
  --bg:#081028;
  --panel:#0f172a;
  --accent:#00d2ff;
  --accent2:#64ffda;
  --text:#dbeafe;
  --muted:#94a3b8;
  --danger:#ff4b2b;
  --gold: #ffcc00;
}

html,body{height:100%;margin:0;background:var(--bg);font-family: monospace; overflow: hidden;}
#wrap{position:relative;height:100vh;display:flex;align-items:center;justify-content:center;}

canvas{
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  background: linear-gradient(180deg,#0b1424 0%, #071026 100%);
  border: 6px solid rgba(0,0,0,0.6);
  box-shadow: 0 8px 30px rgba(0,0,0,0.6);
}

#hud{
  position:absolute; left:18px; top:16px;
  color:var(--accent2); font-size:12px;
  background: rgba(2,6,23,0.8); border:2px solid var(--accent);
  padding:12px; border-radius:4px; min-width:220px;
  backdrop-filter: blur(4px); z-index: 10;
}
#hud .title{font-weight:bold;color:var(--accent);display:block;margin-bottom:6px; text-transform: uppercase;}

#modal{
  position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
  width:450px; max-width:calc(100vw - 40px);
  background:var(--panel); border:4px solid var(--accent); color:var(--text);
  padding:20px; border-radius:0; display:none; z-index:40;
  box-shadow: 0 0 0 4px #000, 0 10px 40px rgba(0,0,0,0.8);
}
#modal h2{margin:0 0 10px 0; font-size:16px; color:var(--accent2); text-align: center; text-transform: uppercase;}

.definition-box {
    background: rgba(0,0,0,0.3);
    border-left: 4px solid var(--accent2);
    padding: 10px;
    margin: 10px 0;
    font-size: 13px;
    line-height: 1.4;
}

.keypad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
.key-display {
  background: #000; border: 2px solid var(--accent); color: var(--accent2);
  font-size: 24px; text-align: center; padding: 10px; margin-bottom: 15px;
  letter-spacing: 10px; height: 30px;
}

.btn{
  padding:12px; border:none; background:var(--accent2); color:#061021; 
  font-weight:bold; cursor:pointer; box-shadow: 4px 4px 0 rgba(0,0,0,0.5);
  font-family: monospace;
}
.btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 rgba(0,0,0,0.5); }
.btn-danger { background: var(--danger); color: white; }
.btn-gold { background: var(--gold); color: #000; }

#help{
  position:absolute; right:16px; bottom:14px; color:var(--muted); font-size:11px;
  background: rgba(2,6,23,0.6); padding:8px; border:1px solid rgba(255,255,255,0.1);
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="1280" height="720"></canvas>

  <div id="hud">
    <span class="title">SISTEMA DE SEGURIDAD</span>
    <div>SALA: <span id="hud-room">1</span> / 4</div>
    <div>LOGS: <span id="hud-progress">0</span> / 4</div>
    <div style="margin-top:8px; border-top:1px solid #334155; padding-top:4px;">
      CÓDIGO: <span id="hud-code" style="color:var(--accent2)">----</span>
    </div>
  </div>

  <div id="modal">
    <h2 id="modal-title">TERMINAL</h2>
    <div id="modal-content">
        <p id="modal-question"></p>
        <div id="keypad-container" style="display:none;">
            <div class="key-display" id="key-screen"></div>
            <div class="keypad-grid" id="keypad-btns"></div>
        </div>
        <div class="opts" id="modal-opts" style="display:flex; flex-direction:column; gap:10px;"></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:12px;justify-content:center;">
      <button class="btn btn-danger" id="modal-close">CERRAR</button>
    </div>
  </div>

  <div id="help">TECLAS: ← → • SALTO: ESPACIO/W • CLIC EN OBJETOS</div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const V_W = 640;
const V_H = 360;
const SCALE = 2; 
const GROUND_Y = V_H - 60;
canvas.width = V_W;
canvas.height = V_H;
canvas.style.width = (V_W * SCALE) + "px";
canvas.style.height = (V_H * SCALE) + "px";

const PALETTE = {
  floor: '#1e293b', wall: '#0f172a', accent: '#00d2ff',
  accent2: '#64ffda', metal: '#475569',
  playerBody: '#f8fafc', playerSkin: '#fdba74'
};

// --- Estado del Juego ---
const player = {
  x: 50, y: GROUND_Y - 48,
  w: 24, h: 48,
  vx: 0, vy: 0,
  speed: 3, jumpForce: -9,
  gravity: 0.5,
  dir: 1, frame: 0, 
  isMoving: false, isGrounded: true
};

const camera = { x: 0 };
const terminals = [];
const doors = [];
const obstacles = [];
const REAL_CODE = ['3','4','1','2'];
let partialCode = ['-','-','-','-'];
let solvedCount = 0;
let modalOpen = false;
let currentKeyInput = "";

const INTRO_TEXT = `
    <div class="definition-box">
        <strong>Propiedades Intrínsecas:</strong> Son aquellas que no dependen de la cantidad de materia (ej. Densidad, Punto de ebullición).<br><br>
        <strong>Propiedades Extrínsecas:</strong> Dependen directamente de la cantidad de materia presente (ej. Masa, Peso, Volumen).
    </div>
    <p>Tu misión: Resuelve los acertijos químicos para obtener el código de escape.</p>
`;

const QUESTIONS = [
  { 
    q: "¿Qué propiedad depende directamente de la cantidad de materia?", 
    opts: ["Punto de Fusión", "Masa", "Densidad"], c: 1,
    def: "<strong>LA MASA:</strong> Es una propiedad extrínseca que representa la cantidad de materia que posee un cuerpo. Se mide en kilogramos (kg) en el SI."
  },
  { 
    q: "¿Cuál es una propiedad intrínseca de la materia?", 
    opts: ["Densidad", "Peso", "Volumen"], c: 0,
    def: "<strong>LA DENSIDAD:</strong> Es una propiedad intrínseca (específica). Es la relación entre la masa de una sustancia y el volumen que ocupa."
  },
  { 
    q: "¿Qué propiedad extrínseca mide el espacio ocupado?", 
    opts: ["Inercia", "Temperatura", "Volumen"], c: 2,
    def: "<strong>EL VOLUMEN:</strong> Es una propiedad extrínseca. Define el espacio tridimensional que ocupa un cuerpo u objeto."
  },
  { 
    q: "¿Qué propiedad representa la resistencia al cambio de movimiento?", 
    opts: ["Inercia", "Color", "Dureza"], c: 0,
    def: "<strong>LA INERCIA:</strong> Es la propiedad de la materia de resistir cualquier cambio en su estado de reposo o movimiento."
  }
];

// --- Inicialización ---
function initWorld() {
  const ROOM_WIDTH = 600;
  const ROOM_GAP = 120;
  for (let i = 0; i < 4; i++) {
    const rx = i * (ROOM_WIDTH + ROOM_GAP);
    
    terminals.push({
      id: i, x: rx + 250, y: GROUND_Y - 80, w: 50, h: 40, solved: false
    });
    
    doors.push({
      id: i, x: rx + ROOM_WIDTH + 40, y: GROUND_Y - 90, w: 40, h: 90, open: false, isFinal: (i === 3)
    });

    // Añadir obstáculos (mesas y cajas)
    obstacles.push({ x: rx + 400, y: GROUND_Y - 30, w: 60, h: 30, type: 'table' });
    if(i > 0) obstacles.push({ x: rx + 100, y: GROUND_Y - 40, w: 40, h: 40, type: 'box' });
  }
}

// --- Dibujado ---
function drawPlayer() {
  const px = player.x - camera.x;
  const py = player.y;
  const walk = player.isMoving ? Math.sin(player.frame * 0.2) * 6 : 0;

  // Piernas
  ctx.fillStyle = "#334155";
  ctx.fillRect(px + 4, py + 34, 6, 14 + (player.isGrounded ? walk/2 : 0));
  ctx.fillRect(px + 14, py + 34, 6, 14 - (player.isGrounded ? walk/2 : 0));

  // Bata/Cuerpo
  ctx.fillStyle = PALETTE.playerBody;
  ctx.fillRect(px, py + 12, 24, 24);
  ctx.fillStyle = "#cbd5e1";
  ctx.fillRect(px + 10, py + 12, 4, 24);

  // Brazos
  ctx.fillStyle = PALETTE.playerBody;
  ctx.fillRect(px - 2, py + 14 + walk, 5, 15);
  ctx.fillRect(px + 21, py + 14 - walk, 5, 15);

  // Cabeza
  ctx.fillStyle = PALETTE.playerSkin;
  ctx.fillRect(px + 4, py, 16, 14);
  ctx.fillStyle = "#475569"; ctx.fillRect(px + 4, py, 16, 4);
  ctx.fillStyle = "#000"; 
  const eyeX = player.dir === 1 ? 14 : 6;
  ctx.fillRect(px + eyeX, py + 6, 3, 3);
}

function drawObstacles() {
  obstacles.forEach(o => {
    const ox = o.x - camera.x;
    ctx.fillStyle = o.type === 'table' ? '#475569' : '#78350f';
    ctx.fillRect(ox, o.y, o.w, o.h);
    ctx.strokeStyle = '#000';
    ctx.strokeRect(ox, o.y, o.w, o.h);
    if(o.type === 'box') {
        ctx.strokeRect(ox + 5, o.y + 5, o.w - 10, o.h - 10);
    }
  });
}

function drawTerminal(t) {
  const tx = t.x - camera.x;
  const blink = (Math.sin(Date.now() / 200) + 1) / 2;
  ctx.fillStyle = PALETTE.metal;
  ctx.fillRect(tx, t.y, t.w, t.h);
  ctx.fillStyle = t.solved ? "#065f46" : "#000";
  ctx.fillRect(tx + 4, t.y + 4, t.w - 8, t.h - 12);
  if (!t.solved) {
    ctx.fillStyle = `rgba(0, 210, 255, ${0.3 * blink})`;
    ctx.fillRect(tx - 2, t.y - 2, t.w + 4, t.h + 4);
  }
}

function drawDoor(d) {
  const dx = d.x - camera.x;
  ctx.fillStyle = d.open ? "#0f172a" : "#334155";
  ctx.fillRect(dx, d.y, d.w, d.h);
  ctx.strokeStyle = d.isFinal ? varColor('--gold') : PALETTE.accent;
  ctx.strokeRect(dx, d.y, d.w, d.h);
  if(d.isFinal && !d.open) {
      const blink = (Math.sin(Date.now() / 150) + 1) / 2;
      ctx.fillStyle = `rgba(255, 204, 0, ${blink})`;
      ctx.fillRect(dx + 10, d.y + 40, 20, 10);
  }
}

function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name); }

// --- Física y Update ---
function update() {
  if (modalOpen) return;

  // Movimiento Horizontal
  player.isMoving = false;
  let nextX = player.x;
  if (keys['ArrowRight'] || keys['d']) { nextX += player.speed; player.dir = 1; player.isMoving = true; }
  if (keys['ArrowLeft'] || keys['a']) { nextX -= player.speed; player.dir = -1; player.isMoving = true; }

  // Salto
  if ((keys[' '] || keys['w'] || keys['ArrowUp']) && player.isGrounded) {
    player.vy = player.jumpForce;
    player.isGrounded = false;
  }

  // Aplicar Gravedad
  player.vy += player.gravity;
  player.y += player.vy;

  // Colisión con suelo
  if (player.y + player.h > GROUND_Y) {
    player.y = GROUND_Y - player.h;
    player.vy = 0;
    player.isGrounded = true;
  }

  // Colisión con Obstáculos
  obstacles.forEach(o => {
      // Colisión vertical (quedar encima)
      if (player.x + player.w > o.x && player.x < o.x + o.w) {
          if (player.vy > 0 && player.y + player.h <= o.y + 10 && player.y + player.h + player.vy >= o.y) {
              player.y = o.y - player.h;
              player.vy = 0;
              player.isGrounded = true;
          }
      }
      // Colisión horizontal (bloqueo)
      if (player.y + player.h > o.y && player.y < o.y + o.h) {
          if (nextX + player.w > o.x && nextX < o.x + o.w) {
              nextX = player.x; // Bloquear movimiento
          }
      }
  });

  player.x = nextX;
  
  // Puertas cerradas bloquean paso
  doors.forEach(d => {
      if(!d.open && player.x + player.w > d.x && player.x < d.x + d.w) {
          player.x = d.x - player.w;
      }
  });

  camera.x += (player.x - camera.x - V_W/3) * 0.1;
  camera.x = Math.max(0, Math.min(camera.x, 2800));
  player.frame++;
  document.getElementById('hud-room').innerText = Math.floor(player.x / 720) + 1;
}

function loop() {
  ctx.clearRect(0,0,V_W,V_H);
  ctx.fillStyle = PALETTE.floor; ctx.fillRect(0, GROUND_Y, V_W, 60);
  drawObstacles();
  terminals.forEach(drawTerminal);
  doors.forEach(drawDoor);
  drawPlayer();
  update();
  requestAnimationFrame(loop);
}

// --- Modales y Lógica ---
function showInitialModal() {
    modalOpen = true;
    const m = document.getElementById('modal');
    m.style.display = 'block';
    document.getElementById('modal-title').innerText = "BIENVENIDO AL LABORATORIO";
    document.getElementById('modal-question').innerHTML = INTRO_TEXT;
    document.getElementById('modal-opts').innerHTML = '';
    document.getElementById('keypad-container').style.display = 'none';
    const b = document.createElement('button');
    b.className = 'btn btn-gold';
    b.innerText = "INICIAR MISIÓN";
    b.onclick = closeModal;
    document.getElementById('modal-opts').appendChild(b);
}

function openQuestion(id) {
  modalOpen = true;
  const q = QUESTIONS[id];
  document.getElementById('modal').style.display = 'block';
  document.getElementById('modal-title').innerText = `TERMINAL QUÍMICA ${id + 1}`;
  document.getElementById('modal-question').innerText = q.q;
  document.getElementById('keypad-container').style.display = 'none';
  const optsDiv = document.getElementById('modal-opts');
  optsDiv.style.display = 'flex';
  optsDiv.innerHTML = '';
  
  q.opts.forEach((opt, i) => {
    const b = document.createElement('button');
    b.className = 'btn'; b.innerText = opt;
    b.onclick = () => {
      if (i === q.c) showDefinition(id);
      else alert("DATOS ERRÓNEOS: Revisa la teoría.");
    };
    optsDiv.appendChild(b);
  });
}

function showDefinition(id) {
    const q = QUESTIONS[id];
    document.getElementById('modal-question').innerHTML = `
        <span style="color:var(--accent2)">¡CORRECTO!</span>
        <div class="definition-box">${q.def}</div>
    `;
    document.getElementById('modal-opts').innerHTML = '';
    const b = document.createElement('button');
    b.className = 'btn btn-gold';
    b.innerText = "ENTENDIDO, CONTINUAR";
    b.onclick = () => {
        terminals[id].solved = true;
        solvedCount++;
        partialCode[id] = REAL_CODE[id];
        document.getElementById('hud-progress').innerText = solvedCount;
        document.getElementById('hud-code').innerText = partialCode.join('');
        if (id < 3) doors[id].open = true;
        closeModal();
    };
    document.getElementById('modal-opts').appendChild(b);
}

function openKeypad() {
  modalOpen = true; currentKeyInput = "";
  document.getElementById('modal').style.display = 'block';
  document.getElementById('modal-title').innerText = "PUERTA DE SALIDA";
  document.getElementById('modal-question').innerText = "INGRESA LOS 4 NÚMEROS OBTENIDOS:";
  document.getElementById('keypad-container').style.display = 'block';
  document.getElementById('modal-opts').style.display = 'none';
  const grid = document.getElementById('keypad-btns');
  grid.innerHTML = '';
  for(let i=1; i<=9; i++) createKey(i, grid);
  createKey("C", grid, "btn-danger"); createKey(0, grid); createKey("OK", grid, "btn-gold");
  updateKeyScreen();
}

function createKey(val, container, extraClass = "") {
    const b = document.createElement('button');
    b.className = `btn ${extraClass}`; b.innerText = val;
    b.onclick = () => {
        if (val === "C") currentKeyInput = "";
        else if (val === "OK") {
            if (currentKeyInput === REAL_CODE.join('')) {
                doors[3].open = true;
                alert("SISTEMA DESBLOQUEADO. ¡HAS ESCAPADO CON ÉXITO!");
                closeModal();
            } else { alert("CÓDIGO ERRÓNEO"); currentKeyInput = ""; }
        } else if (currentKeyInput.length < 4) currentKeyInput += val;
        updateKeyScreen();
    };
    container.appendChild(b);
}

function updateKeyScreen() { document.getElementById('key-screen').innerText = currentKeyInput.padEnd(4, '_'); }
function closeModal() { modalOpen = false; document.getElementById('modal').style.display = 'none'; }

canvas.addEventListener('click', (e) => {
  if (modalOpen) return;
  const rect = canvas.getBoundingClientRect();
  const clickX = (e.clientX - rect.left) / SCALE + camera.x;
  const clickY = (e.clientY - rect.top) / SCALE;

  terminals.forEach(t => {
    if (clickX > t.x && clickX < t.x + t.w && clickY > t.y && clickY < t.y + t.h) {
      if (!t.solved) openQuestion(t.id);
    }
  });

  const lastDoor = doors[3];
  if (clickX > lastDoor.x && clickX < lastDoor.x + lastDoor.w) {
    if (solvedCount < 4) alert("Terminales pendientes. No tienes el código.");
    else openKeypad();
  }
});

const keys = {};
window.onkeydown = (e) => keys[e.key] = true;
window.onkeyup = (e) => keys[e.key] = false;

document.getElementById('modal-close').onclick = closeModal;

initWorld();
window.onload = showInitialModal;
loop();
</script>
</body>
</html>
